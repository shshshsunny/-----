<!DOCTYPE html>
<html lang="en">
    <head>
        <title>POPCAT CLASSIC</title>
        <style>
            body {
                margin: 0;
                user-select: none;
                font-family: sans-serif;
            }
            .container {
                height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                background-color: #bdaa90;
            }
            .title {
                width: 80%;
                max-width: 600px;
                margin-top: 2em;
            }
            .cat-image {
                width: 100%;
                max-width: 800px;
                flex: 1;
                text-align: center;
                color: white;
                font-size: 80px;
                -webkit-text-stroke: 3px black;
            }
            #p {
                background-image: url('imgs/p.png');
                background-position: bottom;
                background-size: contain;
                background-repeat: no-repeat;
            }
            #op {
                background-image: url('imgs/op.png');
                background-position: bottom;
                background-size: contain;
                background-repeat: no-repeat;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <img class="title" src="imgs/popcat.svg" alt="POPCAT CLASSIC">
            <div class="cat-image" id="p">0</div>
            
        </div>

        <div class="container"id="p2"></div>
        <script>
            let count=0;
            let catImage = document.getElementById('p');


            function addCount(){
                count++;
                catImage.innerHTML=count;
                catImage.id = 'op';
            }
            let close = () => {
                catImage.id = 'p';
            }

            document.addEventListener('pointerdown', addCount);
            document.addEventListener('pointerup', close);
        </script>

    </body>

</html>
